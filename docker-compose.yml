services:
  timescaledb:
    image: timescale/timescaledb:2.26.1-pg17
    environment:
      - POSTGRES_USER=hrmonitor
      - POSTGRES_PASSWORD=hrmonitor
      - POSTGRES_DB=hrmonitor
    volumes:
      - ts-data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped

  redis:
    image: redis:8.6.2-alpine
    expose:
      - "6379"
    restart: unless-stopped

  backend:
    build: ./apps/backend
    environment:
      - DATABASE_URL=postgres://hrmonitor:hrmonitor@timescaledb:5432/hrmonitor
      - REDIS_URL=redis://redis:6379
      - RUST_LOG=hrmonitor_backend=info
      - AUTH_SESSION_COOKIE_NAME=${AUTH_SESSION_COOKIE_NAME:-authjs.session-token}
      - AUTH_SESSION_COOKIE_NAME_SECURE=${AUTH_SESSION_COOKIE_NAME_SECURE:-__Secure-authjs.session-token}
    expose:
      - "3001"
    depends_on:
      - timescaledb
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      args:
        REACT_PROFILING: ${REACT_PROFILING:-false}
    environment:
      - DATABASE_URL=postgres://hrmonitor:hrmonitor@timescaledb:5432/hrmonitor
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_DISCORD_ID=${DISCORD_CLIENT_ID}
      - AUTH_DISCORD_SECRET=${DISCORD_CLIENT_SECRET}
      - AUTH_TRUST_HOST=true
      - ALLOW_NEW_SIGNUPS=${ALLOW_NEW_SIGNUPS:-false}
    expose:
      - "3000"
    volumes:
      - static-assets:/static-export
    depends_on:
      - timescaledb
      - backend
    restart: unless-stopped

  nginx:
    build: ./apps/nginx
    expose:
      - "80"
    volumes:
      - static-assets:/usr/share/nginx/static:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    restart: unless-stopped
    profiles:
      - prod

volumes:
  ts-data:
  static-assets:
