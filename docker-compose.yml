services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    environment:
      - POSTGRES_USER=hrmonitor
      - POSTGRES_PASSWORD=hrmonitor
      - POSTGRES_DB=hrmonitor
    volumes:
      - ts-data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped

  backend:
    build: ./apps/backend
    environment:
      - DATABASE_URL=postgres://hrmonitor:hrmonitor@timescaledb:5432/hrmonitor
      - RUST_LOG=hrmonitor_backend=info
    expose:
      - "3001"
    depends_on:
      - timescaledb
    restart: unless-stopped

  frontend:
    build: ./apps/frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:3001
    depends_on:
      - backend
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
    restart: unless-stopped
    profiles:
      - prod

volumes:
  ts-data:
