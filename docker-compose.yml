services:
  timescaledb:
    image: timescale/timescaledb:2.26.2-pg17
    environment:
      - POSTGRES_USER=hrmonitor
      - POSTGRES_PASSWORD=hrmonitor
      - POSTGRES_DB=hrmonitor
    volumes:
      - ts-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrmonitor -d hrmonitor"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:8.6.2-alpine
    expose:
      - "6379"
    restart: unless-stopped

  nats:
    image: nats:2.12.6-alpine
    expose:
      - "4222"
    restart: unless-stopped

  migration:
    build:
      context: ./backend
      dockerfile: migration/Dockerfile
    environment:
      - DATABASE_URL=postgres://hrmonitor:hrmonitor@timescaledb:5432/hrmonitor
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: api-backend/Dockerfile
    environment:
      - DATABASE_URL=postgres://hrmonitor:hrmonitor@timescaledb:5432/hrmonitor
      - REDIS_URL=redis://redis:6379
      - NATS_URL=nats://nats:4222
      - RUST_LOG=api_backend=info
      - PULSOID_CLIENT_ID=${PULSOID_CLIENT_ID}
      - PULSOID_CLIENT_SECRET=${PULSOID_CLIENT_SECRET}
      - PULSOID_REDIRECT_URI=${PULSOID_REDIRECT_URI}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY}
    expose:
      - "3001"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started
      migration:
        condition: service_completed_successfully
    restart: unless-stopped

  pulsoid-ingest:
    build:
      context: ./backend
      dockerfile: pulsoid-ingest/Dockerfile
    environment:
      - DATABASE_URL=postgres://hrmonitor:hrmonitor@timescaledb:5432/hrmonitor
      - REDIS_URL=redis://redis:6379
      - NATS_URL=nats://nats:4222
      - RUST_LOG=pulsoid_ingest=info
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY}
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started
      migration:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        REACT_PROFILING: ${REACT_PROFILING:-false}
    environment:
      - DATABASE_URL=postgres://hrmonitor:hrmonitor@timescaledb:5432/hrmonitor
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_DISCORD_ID=${DISCORD_CLIENT_ID}
      - AUTH_DISCORD_SECRET=${DISCORD_CLIENT_SECRET}
      - AUTH_URL=${AUTH_URL:?AUTH_URL must be set}
      - AUTH_TRUST_HOST=true
      - HOSTNAME=0.0.0.0
    expose:
      - "3000"
    volumes:
      - static-assets:/static-export
    depends_on:
      - timescaledb
      - backend
    restart: unless-stopped

  nginx:
    build: ./nginx
    expose:
      - "80"
    volumes:
      - static-assets:/usr/share/nginx/static:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    restart: unless-stopped
    profiles:
      - prod

volumes:
  ts-data:
  static-assets:
